version: 1
context: brmonitor_single_agent_execution

branches:
  agent_a: feat/br-variant-base

owners:
  agent_a:
    description: "Single-agent ownership for the entire repository"
    files:
      - "**"

shared_owner: []

handoff:
  required_for_non_owned_files: false
  request_template:
    fields:
      - from
      - to
      - reason
      - files
      - expected_contract
      - blocked

integration_order:
  - merge: agent_a

quality_gates:
  commands:
    - npm run typecheck
    - npm run typecheck:api
    - npm run test:data
